name: Bug report
description: Report a reproducible problem in AVAL Design Studio.
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve AVAL Design Studio. Do not include private source media or security-sensitive details. Report vulnerabilities through GitHub Security Advisories instead.
  - type: input
    id: version
    attributes:
      label: Studio version
      description: Find this in the app status area or release name.
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Windows x64
        - Linux x64
        - Browser development build
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open …
        2. Select …
        3. Observe …
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Media facts
      description: Container, codec, dimensions, frame rate, duration, and alpha mode. Do not attach private source media.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Remove file paths, usernames, tokens, and other sensitive information first.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: This is not a security vulnerability.
          required: true
