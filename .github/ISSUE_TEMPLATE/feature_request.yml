name: Feature request
description: Propose a focused improvement to the AVAL authoring workflow.
title: "[Feature]: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Authoring problem
      description: What is difficult or impossible today, and who encounters it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed workflow
      description: Describe the smallest useful change and how it should behave.
    validations:
      required: true
  - type: textarea
    id: format
    attributes:
      label: AVAL format impact
      description: Does this require a project-schema, compiler, runtime, or wire-format change?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and the upstream AVAL repository.
          required: true
        - label: I understand large format changes should be discussed before implementation.
          required: true
