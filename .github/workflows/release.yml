name: Release desktop app

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      source-sha: ${{ steps.release.outputs.source-sha }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v7
        with:
          node-version: 22.12.0
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify source and synchronized release version
        id: release
        shell: bash
        run: |
          pnpm check
          cargo check --locked --manifest-path src-tauri/Cargo.toml
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "app-v${VERSION}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version app-v${VERSION}." >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=app-v${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "source-sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

  create-release:
    name: Create one draft release
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.release.outputs.release-id }}
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.validate.outputs.version }}
      TAG: ${{ needs.validate.outputs.tag }}
      SOURCE_SHA: ${{ needs.validate.outputs.source-sha }}
    steps:
      - name: Verify updater signing material
        shell: bash
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY || secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "${TAURI_UPDATER_PUBLIC_KEY}" || -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "TAURI_UPDATER_PUBLIC_KEY (Actions variable) and TAURI_SIGNING_PRIVATE_KEY (Actions secret) must be configured before releasing." >&2
            exit 1
          fi

      - name: Create or reuse the coordinated draft
        id: release
        shell: bash
        run: |
          RELEASE_MATCHES="$(
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              | jq -sc --arg tag "${TAG}" '[.[][] | select(.tag_name == $tag)]'
          )"
          RELEASE_COUNT="$(jq 'length' <<< "${RELEASE_MATCHES}")"
          if [[ "${RELEASE_COUNT}" -gt 1 ]]; then
            echo "Found ${RELEASE_COUNT} releases for ${TAG}; refusing to choose between duplicates." >&2
            exit 1
          elif [[ "${RELEASE_COUNT}" -eq 1 ]]; then
            RELEASE_JSON="$(jq -c '.[0]' <<< "${RELEASE_MATCHES}")"
            if [[ "$(jq -r '.draft' <<< "${RELEASE_JSON}")" != "true" ]]; then
              echo "Release ${TAG} already exists and is published; refusing to replace it." >&2
              exit 1
            fi
            RELEASE_ID="$(jq -r '.id' <<< "${RELEASE_JSON}")"
          else
            RELEASE_JSON="$(gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" \
              -F "tag_name=${TAG}" \
              -F "target_commitish=${SOURCE_SHA}" \
              -F "name=AVAL Design Studio v${VERSION}" \
              -F "body=Installers and signed in-app update artifacts for AVAL Design Studio." \
              -F draft=true \
              -F prerelease=false \
              -F generate_release_notes=true)"
            RELEASE_ID="$(jq -r '.id' <<< "${RELEASE_JSON}")"
          fi
          RELEASE_TARGET="$(jq -r '.target_commitish' <<< "${RELEASE_JSON}")"
          if [[ "${RELEASE_TARGET}" != "${SOURCE_SHA}" ]]; then
            echo "Release ${TAG} targets ${RELEASE_TARGET}; expected validated commit ${SOURCE_SHA}." >&2
            exit 1
          fi
          if [[ ! "${RELEASE_ID}" =~ ^[0-9]+$ ]]; then
            echo "GitHub did not return a numeric release ID for ${TAG}." >&2
            exit 1
          fi
          echo "All platform jobs will upload to release ${RELEASE_ID} (${TAG})."
          echo "release-id=${RELEASE_ID}" >> "${GITHUB_OUTPUT}"

  publish:
    name: ${{ matrix.label }}
    needs:
      - validate
      - create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-15
            target: aarch64-apple-darwin
          - label: macOS Intel
            platform: macos-15-intel
            target: x86_64-apple-darwin
          - label: Linux x64
            platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - label: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v7
        with:
          node-version: 22.12.0
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Tauri Linux prerequisites
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pinned official AVAL compiler
        shell: bash
        run: |
          AVAL_REPOSITORY="$(node -p "JSON.parse(require('fs').readFileSync('toolchain/versions.json')).aval.repository")"
          AVAL_COMMIT="$(node -p "JSON.parse(require('fs').readFileSync('toolchain/versions.json')).aval.commit")"
          git clone --filter=blob:none "${AVAL_REPOSITORY}" .toolchain/aval-source
          git -C .toolchain/aval-source checkout --detach "${AVAL_COMMIT}"
          npm ci --ignore-scripts --prefix .toolchain/aval-source
          npm run build:public-packages --prefix .toolchain/aval-source

      - name: Download reviewed media sidecars
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ matrix.target }}
        run: |
          TOOLCHAIN_RELEASE="$(node -p "JSON.parse(require('fs').readFileSync('toolchain/versions.json')).media.archiveRelease")"
          ARCHIVE="aval-media-toolchain-${TARGET}.tar.gz"
          mkdir -p .toolchain/download ".toolchain/media/${TARGET}"
          gh release download "${TOOLCHAIN_RELEASE}" --pattern "${ARCHIVE}" --pattern "${ARCHIVE}.sha256" --dir .toolchain/download
          node scripts/verify-archive-sha256.mjs ".toolchain/download/${ARCHIVE}" ".toolchain/download/${ARCHIVE}.sha256"
          tar -xzf ".toolchain/download/${ARCHIVE}" -C ".toolchain/media/${TARGET}"

      - name: Prepare bundled executables
        env:
          AVAL_TARGET_TRIPLE: ${{ matrix.target }}
        run: pnpm toolchain:prepare -- ${{ matrix.target }}

      - name: Verify complete packaged toolchain
        env:
          AVAL_TARGET_TRIPLE: ${{ matrix.target }}
        run: pnpm toolchain:verify -- ${{ matrix.target }}

      - name: Generate signed release configuration
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY || secrets.TAURI_UPDATER_PUBLIC_KEY }}
          AVAL_TARGET_TRIPLE: ${{ matrix.target }}
        run: pnpm release:config

      - name: Build and attach release artifacts
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          tagName: ${{ needs.validate.outputs.tag }}
          releaseDraft: true
          retryAttempts: 2
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }} --config src-tauri/tauri.release.conf.json

      - name: Attach toolchain provenance
        uses: actions/upload-artifact@v7
        with:
          name: toolchain-manifest-${{ matrix.target }}
          path: src-tauri/toolchain-runtime/toolchain-manifest.json
          if-no-files-found: error

  publish-release:
    name: Publish completed release
    needs:
      - validate
      - create-release
      - publish
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.validate.outputs.version }}
      TAG: ${{ needs.validate.outputs.tag }}
      SOURCE_SHA: ${{ needs.validate.outputs.source-sha }}
      RELEASE_ID: ${{ needs.create-release.outputs.release-id }}
    steps:
      - uses: actions/checkout@v7

      - name: Download toolchain provenance
        uses: actions/download-artifact@v8
        with:
          pattern: toolchain-manifest-*
          path: provenance

      - name: Attach provenance and checksums
        shell: bash
        run: |
          RELEASE_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")"
          ACTUAL_TAG="$(jq -r '.tag_name' <<< "${RELEASE_JSON}")"
          ACTUAL_TARGET="$(jq -r '.target_commitish' <<< "${RELEASE_JSON}")"
          if [[ "${ACTUAL_TAG}" != "${TAG}" || "${ACTUAL_TARGET}" != "${SOURCE_SHA}" ]]; then
            echo "Release ${RELEASE_ID} no longer matches ${TAG} at ${SOURCE_SHA}." >&2
            exit 1
          fi
          mkdir -p release-assets
          for directory in provenance/toolchain-manifest-*; do
            target="${directory#provenance/toolchain-manifest-}"
            cp "${directory}/toolchain-manifest.json" "release-assets/toolchain-manifest-${target}.json"
          done
          gh release upload "${TAG}" release-assets/toolchain-manifest-*.json --clobber
          rm -f release-assets/toolchain-manifest-*.json
          gh release download "${TAG}" --dir release-assets
          pnpm release:verify-assets -- release-assets "${VERSION}"
          find release-assets -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 shasum -a 256 \
            | sed 's#  release-assets/#  #' > release-assets/SHA256SUMS
          gh release upload "${TAG}" release-assets/SHA256SUMS --clobber

      - name: Publish release for desktop updates
        shell: bash
        run: |
          gh release edit "${TAG}" --draft=false --latest
